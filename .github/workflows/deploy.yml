name: Deploy Biblio Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./biblio

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: biblio/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Frontend bauen
        run: npm run build

      - name: Dateien hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./biblio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4